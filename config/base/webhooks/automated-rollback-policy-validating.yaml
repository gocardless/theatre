---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: automated-rollback-policy-validate
  annotations:
    cert-manager.io/inject-ca-from: theatre-system/theatre-automated-rollback-manager
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      caBundle: Cg==
      service:
        name: theatre-automated-rollback-manager
        namespace: theatre-system
        path: /validate-automated-rollback-policies
        port: 443
    failurePolicy: Fail
    name: automated-rollback-policy.deploy.crd.gocardless.com
    rules:
      - apiGroups:
          - deploy.crd.gocardless.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
        resources:
          - automatedrollbackpolicies
        scope: "*"
    sideEffects: None
    timeoutSeconds: 10
