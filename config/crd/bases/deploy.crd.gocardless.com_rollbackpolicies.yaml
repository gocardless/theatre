              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired state of RollbackPolicy
            properties:
              automated:
                description: Automated configures automated rollback behavior.
                properties:
                  cooldownPeriod:
                    description: CooldownPeriod is the minimum time to wait between
                      automated rollbacks.
                    type: string
                  enabled:
                    default: false
                    description: Enabled controls whether automated rollbacks are
